name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Syntax check
        run: for f in src/*.mjs scripts/*.mjs; do node --check "$f"; done
      - name: Offline demo — mouse models
        run: npm run demo
      - name: Offline demo — resveratrol / SIRT1
        run: npm run demo -- resveratrol-sirt1
      - name: Grounding is discriminating
        run: |
          node --input-type=module -e '
            import { groundField } from "./src/grounding.mjs";
            const text = "the murine orthologs are close to random (R(2) between 0.0 and 0.1).";
            const bad = groundField({ value: "R2 of 0.85", quote: "R(2) between 0.0 and 0.1" }, text);
            const ok  = groundField({ value: "R2 between 0.0 and 0.1", quote: "R(2) between 0.0 and 0.1" }, text);
            if (bad.grounded) { console.error("FAIL: fabricated number not caught"); process.exit(1); }
            if (!ok.grounded) { console.error("FAIL: legit field rejected"); process.exit(1); }
            console.log("grounding check OK");
          '
